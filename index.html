<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Jordan Store - Exact Match</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="header-left">
                <div class="logo">Jordan.</div>
                <nav class="main-nav">
                    <a href="#">New</a>
                    <a href="#" class="active-link">Man</a>
                    <a href="#">Woman</a>
                </nav>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" placeholder="Search">
                    <span class="search-icon">🔍</span>
                </div>
                <div class="cart-icon">🛒</div>
                <div class="menu-icon">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </header>

        <main>
            <section class="left-content">
                <div class="text-group">
                    <h1 class="title-white">Jordan</h1>
                    <h1 class="title-green">Sneakers</h1>
                </div>
                <div class="price-section">
                    <div class="green-line"></div>
                    <span class="main-price">5.5M</span>
                </div>
                <div class="mini-card">
                    <img src="giay-phu.png" class="shoe-small" alt="Small Shoe">
                    <p class="price-small">2.5M</p>
                </div>
            </section>

            <section class="center-content">
                <div class="big-green-card">
                    <div class="white-glow"></div>
                    <img src="jordan.png" class="shoe-big" alt="Main Shoe">
                    <div class="add-button">+</div>
                </div>

                <div class="selection-container">
                    <div class="select-group">
                        <label>SELECT SIZE</label>
                        <div class="options-row">
                            <span>US 7</span> <span class="active-opt">US 8</span> <span>US 9</span> <span>US 10</span>
                        </div>
                    </div>
                    <div class="select-group">
                        <label>SELECT COLOR'S</label>
                        <div class="dots-row">
                            <span class="dot c1"></span><span class="dot c2"></span><span class="dot c3"></span><span class="dot c4"></span>
                        </div>
                    </div>
                </div>
            </section>

            <aside class="social-box">
                <div class="social-inner">
                    <p>Facebook</p>
                    <p>Tweeter</p>
                    <p>Instagram</p>
                </div>
            </aside>
        </main>

        <footer>
            <div class="footer-btn">MORE PRODUCT'S <span>↓</span></div>
        </footer>
    </div>
</body>
</html>
